<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Квиз Энерголетие</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Настраиваем фирменные цвета, градиент и шрифт
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
          },
          colors: {
            brand: {
              accent1: '#1E2F5E',   // Акцентный синий
              accent2: '#005754',   // Акцентный зеленый
              secondary: '#EBF5F9', // Второстепенный светло-голубой
              text: '#1C1E1D',      // Основной текст
              muted: '#68706D',     // Второстепенный текст
              border: '#E1E4E2',    // Цвет рамок (нейтральный)
              cardtext: '#627A84',  // Цвет текста для спец-карточки
              focus: '#BCE8EA',     // Цвет обводки инпутов
              checkbox_bg: '#E5EEF1' // Фон чекбокса
            }
          },
          backgroundImage: {
            'brand-grad': 'linear-gradient(90deg, #40CEC7 0%, #0071BA 50%, #1E315E 100%)',
          }
        }
      }
    }
  </script>

  <style>
    #medscan-quiz-wrapper {
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #medscan-quiz-wrapper * {
      box-sizing: border-box;
    }
    #medscan-quiz-wrapper button, 
    #medscan-quiz-wrapper input {
      font-family: inherit;
      outline: none;
      box-shadow: none;
    }
    #medscan-quiz-wrapper input[type="text"],
    #medscan-quiz-wrapper input[type="tel"],
    #medscan-quiz-wrapper input[type="email"] {
      background-color: #FAFAFA;
      border: 1px solid #E1E4E2;
      color: #1C1E1D;
      transition: border-color 0.2s ease;
    }
    /* Обводка инпута при фокусе */
    #medscan-quiz-wrapper input:focus {
      border-color: #BCE8EA !important;
      box-shadow: 0 0 0 1px #BCE8EA;
    }
    #medscan-quiz-wrapper input::placeholder {
      color: #A0A5A3;
    }
    /* Плавные анимации появления */
    @keyframes mzFadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mz-animate-in {
      animation: mzFadeInUp 0.5s ease-out forwards;
    }
    /* Убираем любые браузерные тени и лишние обводки у кнопок ответов */
    .quiz-option-btn {
      box-shadow: none !important;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
  </style>
</head>
<body>

<div id="medscan-quiz-wrapper" class="min-h-screen bg-brand-secondary text-brand-text selection:bg-white/50 py-6 sm:py-8 md:py-12">
  <div class="max-w-3xl mx-auto px-4">
    
    <!-- Шапка с идеально центрированным крестиком и обновленными размерами лого -->
    <div class="relative flex items-center justify-center mb-6 sm:mb-8 md:mb-10 min-h-[50px] sm:min-h-[58px] md:min-h-[68px]">
      <!-- Левая часть: лого Медскан прижат к центру -->
      <div class="flex-1 flex justify-end pr-3 sm:pr-4 md:pr-5">
        <img src="https://static.tildacdn.com/tild3538-6533-4566-b639-313061383664/medscan_hadassah_squ.svg" class="w-auto h-[50px] sm:h-[58px] md:h-[68px] block" alt="Medscan">
      </div>
      
      <!-- Центр: крестик (всегда ровно посередине страницы) -->
      <div class="absolute left-1/2 -translate-x-1/2 flex items-center justify-center h-full">
        <span class="text-[20px] sm:text-[22px] md:text-[24px] font-semibold text-brand-border leading-none select-none">×</span>
      </div>

      <!-- Правая часть: лого Кофемания прижат к центру -->
      <div class="flex-1 flex justify-start pl-3 sm:pl-4 md:pl-5">
        <img src="https://static.tildacdn.com/tild3264-3965-4435-a361-376138633631/svg_1778161093620.svg" class="w-auto h-[50px] sm:h-[58px] md:h-[68px] block object-contain" alt="Кофемания">
      </div>
    </div>

    <div id="medscan-quiz-container"></div>

  </div>
</div>

    },

    checkForm: function() {
      const name = document.getElementById('mz_name').value.trim();
      const phone = document.getElementById('mz_phone').value.trim();
      const a1 = document.getElementById('mz_a1').checked;
      const a2 = document.getElementById('mz_a2').checked;
      const btn = document.getElementById('mz_btn');

      // Убрана проверка a3 из условия
      if (name && phone && a1 && a2) {
        btn.disabled = false;
        btn.className = "w-full bg-brand-grad hover:opacity-90 text-white text-[18px] sm:text-[19px] md:text-[20px] font-semibold tracking-[-0.01em] h-[48px] sm:h-[52px] md:h-auto py-0 md:py-5 px-8 md:px-10 rounded-[100px] transition-all border-none cursor-pointer shadow-lg flex items-center justify-center";
      } else {
        btn.disabled = true;
        btn.className = "w-full bg-brand-border/60 cursor-not-allowed text-brand-muted text-[18px] sm:text-[19px] md:text-[20px] font-semibold tracking-[-0.01em] h-[48px] sm:h-[52px] md:h-auto py-0 md:py-5 px-8 md:px-10 rounded-[100px] transition-all border-none flex items-center justify-center";
      }
    },

    submitOnlyMake: function(event) {
      event.preventDefault();
      const btn = document.getElementById('mz_btn');
      btn.innerHTML = "Отправка...";
      btn.disabled = true;

      // Имитируем небольшую задержку загрузки для реалистичности в портфолио
      setTimeout(() => {
        this.startQuiz();
      }, 600);
    },

    startQuiz: function() {
      this.step = 'quiz';
      this.currentQuestionIndex = 0;
      this.answers = [];
      this.render();
    },

    answer: function(category) {
      this.answers.push(category);
      if (this.currentQuestionIndex < questions.length - 1) {
        this.currentQuestionIndex++;
        this.render();
      } else {
        this.step = 'result';
        this.render();
      }
    },

    calculateResult: function() {
      const counts = this.answers.reduce((acc, cat) => {
        acc[cat] = (acc[cat] || 0) + 1;
        return acc;
      }, {});

      let maxCat = Object.keys(counts)[0];
      let maxCount = counts[maxCat];

      for (const cat in counts) {
        if (counts[cat] > maxCount) {
          maxCat = cat;
          maxCount = counts[cat];
        }
      }
      return resultsData[maxCat];
    },

    restart: function() {
      this.step = 'intro';
      this.currentQuestionIndex = 0;
      this.answers = [];
      this.render();
    },

    copyPromo: function(text, btnElement, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
      }

      let textArea = document.createElement("textarea");
      textArea.value = text;
      
      textArea.setAttribute('readonly', '');
      
      textArea.style.position = "fixed";
      textArea.style.left = "-999999px";
      textArea.style.top = "-999999px";
      document.body.appendChild(textArea);
      
      textArea.focus();
      textArea.select();
      textArea.setSelectionRange(0, 999999);

      try {
        document.execCommand('copy');
      } catch (error) {
        console.error('Copy failed', error);
      }
      
      document.body.removeChild(textArea);
      if (window.getSelection) {
        window.getSelection().removeAllRanges();
      }

      btnElement.innerHTML = ICONS.copyCheck;
      btnElement.classList.remove('opacity-60');
      btnElement.classList.add('opacity-100');

      const label = btnElement.closest('.flex-col').querySelector('.promo-label');
      if(label) label.innerText = "СКОПИРОВАНО";

      setTimeout(() => {
        btnElement.innerHTML = ICONS.copy; 
        btnElement.classList.add('opacity-60');
        btnElement.classList.remove('opacity-100');
        if(label) label.innerText = "ПРОМОКОД";
      }, 2000);
    }
  };

  document.addEventListener("DOMContentLoaded", () => {
    window.medscanQuiz.render();
  });
</script>
